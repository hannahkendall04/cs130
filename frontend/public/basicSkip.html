<html>
  <head>
    <title>Basic Skip</title>
  </head>
  <body>
    <h1>Select Skip Range</h1>
    <p>Enter the start and end times (in seconds) for the range you want to skip:</p>

    <label for="startTime">Start Time (seconds):</label>
    <input type="number" id="startTime" name="startTime"><br><br>

    <label for="endTime">End Time (seconds):</label>
    <input type="number" id="endTime" name="endTime"><br><br>

    <button id="saveButton">Save Skip Range</button>

    <script src="basicSkip.js"></script>
  </body>
</html>
